# SPA + same-origin API proxy to event-admin.
#
# The SPA (built with empty VITE_API_BASE_URL) sends API requests relative to
# its own origin; event-admin is the ONLY backend it talks to (event-admin
# proxies /api/users/* to event-users itself). This mirrors the Vite dev proxy
# in vite.config.ts: /api, /auth and /bookings go to event-admin.
# /health is answered by nginx itself (container liveness probe).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://event-admin:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        proxy_pass http://event-admin:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Liveness probe for THIS container (k8s livenessProbe / compose
    # healthcheck): answered by nginx itself, no dependency on event-admin.
    # event-admin's own probes live on its published port (/health, /ready).
    location = /health {
        default_type text/plain;
        return 200 "ok";
    }

    # /bookings is BOTH an SPA route (browser navigation, Accept: text/html)
    # and an event-admin API prefix (fetch with Accept: application/json) — the
    # SAME url (/bookings/<uid>) is served as HTML for a navigation and as JSON
    # for the app's fetch. `Vary: Accept` is REQUIRED: without it the browser
    # reuses the cached deep-link HTML for the identical-url JSON XHR, so the
    # detail page's getBookingDetails() receives index.html and crashes.
    location /bookings {
        error_page 418 = @spa;
        if ($http_accept ~* "text/html") {
            return 418;
        }
        add_header Vary Accept always;
        proxy_pass http://event-admin:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location @spa {
        add_header Vary Accept always;
        try_files /index.html =404;
    }
}
